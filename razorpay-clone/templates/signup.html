<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Sign Up - PayFlow</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="auth-container">

        <div class="auth-card">

            <h2>Create Account</h2>

            <p class="subtitle">
                Join PayFlow and start managing payments
            </p>

            <!-- Flash Messages -->
            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="message">
                {{ messages[0] }}
            </div>
            {% endif %}
            {% endwith %}

            <form method="POST">

                <div class="input-group">
                    <i class="fa-solid fa-user"></i>

                    <input
                        type="text"
                        name="name"
                        placeholder="Full Name"
                        required>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>

                    <input
                        type="email"
                        name="email"
                        placeholder="Email Address"
                        required>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>

                    <input
                        type="password"
                        name="password"
                        placeholder="Create Password"
                        minlength="6"
                        required>
                </div>

                <button
                    type="submit"
                    class="auth-btn">

                    Create Account

                </button>

            </form>

            <div class="auth-links">

                <p>
                    Already have an account?
                    <a href="/login">
                        Login
                    </a>
                </p>

                <p>
                    <a href="/">
                        Back to Home
                    </a>
                </p>

            </div>

        </div>

    </div>

</body>

</html>
