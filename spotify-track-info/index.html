<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Downloader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Spotify Downloader</h1>

        id="spotifyUrl"

</div>

<script src="script.js"></script>

</body>
</html>
